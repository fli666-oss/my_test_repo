<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京-巴黎航班查询</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ 北京-巴黎航班查询</h1>
            <p class="subtitle">Flight Search from Beijing to Paris</p>
        </header>

        <section class="search-form">
            <form id="flightSearchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>出发城市</label>
                        <select name="origin" id="origin">
                            <option value="PEK" selected>北京 (PEK)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目的城市</label>
                        <select name="destination" id="destination">
                            <option value="CDG" selected>巴黎 (CDG)</option>
                            <option value="ORY">巴黎奥利 (ORY)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出发日期</label>
                        <input type="date" name="departure_date" id="departure_date" required>
                    </div>
                    <div class="form-group">
                        <label>返回日期</label>
                        <input type="date" name="return_date" id="return_date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>人数</label>
                        <select name="passengers" id="passengers">
                            <option value="1" selected>1人</option>
                            <option value="2">2人</option>
                            <option value="3">3人</option>
                            <option value="4">4人</option>
                            <option value="5">5人</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>舱位等级</label>
                        <select name="travel_class" id="travel_class">
                            <option value="1" selected>经济舱</option>
                            <option value="2">超级经济舱</option>
                            <option value="3">商务舱</option>
                            <option value="4">头等舱</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>行程类型</label>
                        <select name="type" id="type">
                            <option value="1" selected>往返</option>
                            <option value="2">单程</option>
                            <option value="3">多城市</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>中转次数</label>
                        <select name="stops" id="stops">
                            <option value="0" selected>不限</option>
                            <option value="1">直飞</option>
                            <option value="2">1次中转以内</option>
                            <option value="3">2次中转以内</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>排序方式</label>
                        <select name="sort_by" id="sort_by">
                            <option value="1" selected>推荐航班</option>
                            <option value="2">价格</option>
                            <option value="3">时长</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-search">🔍 搜索航班</button>
            </form>
        </section>

        <section class="results" id="results" style="display: none;">
            <h2>搜索结果</h2>
            <div id="resultsList"></div>
        </section>

        <section class="price-chart" id="priceChart" style="display: none;">
            <h2>📈 价格趋势</h2>
            <div class="chart-container">
                <canvas id="priceChartCanvas"></canvas>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
